model:
  hidden_size: 64
  num_message_passing_steps: 6
  decoder_hidden: 128

dataset:
  type: pyg_opf
  root: data/pyg_opf_case14_clean
  split: train
  case_name: pglib_opf_case14_ieee
  num_groups: 1
  topological_perturbations: false
  force_reload: false
  batch_size: 1
  shuffle: true

train:
  lr: 0.0002
  steps: 200
  log_every: 20
  constraint_weight: 0.1
  grad_clip: 1.0
  out_dir: artifacts/case14
