model:
  hidden_size: 128
  num_message_passing_steps: 12
  decoder_hidden: 256

dataset:
  type: synthetic
  size: 256
  n_bus: 64
  n_gen: 24
  n_load: 40
  n_shunt: 16
  n_line: 96
  n_trafo: 24
  seed: 7
  shuffle: true

train:
  lr: 0.0002
  steps: 80
  log_every: 10
  constraint_weight: 0.1
  grad_clip: 1.0
  out_dir: artifacts
